<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Impostor Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #eee;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .screen { display: none; width: 100%; max-width: 420px; }
  .screen.active { display: flex; flex-direction: column; gap: 1rem; }

  h1 { font-size: 2rem; text-align: center; letter-spacing: 2px; }
  h2 { font-size: 1.4rem; text-align: center; }

  .subtitle {
    text-align: center;
    color: #888;
    font-size: 0.9rem;
  }

  input {
    width: 100%;
    padding: 0.9rem 1rem;
    border-radius: 12px;
    border: 2px solid #333;
    background: #1a1a2e;
    color: #eee;
    font-size: 1.1rem;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #7c3aed; }

  button {
    width: 100%;
    padding: 0.9rem;
    border-radius: 12px;
    border: none;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 1px;
  }
  button:active { transform: scale(0.97); }

  .btn-primary { background: #7c3aed; color: #fff; }
  .btn-secondary { background: #1f2937; color: #ccc; }
  .btn-danger { background: #dc2626; color: #fff; }
  .btn-success { background: #16a34a; color: #fff; }

  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .player-list {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    min-height: 80px;
  }

  .player-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.6rem;
    background: #252540;
    border-radius: 8px;
    font-size: 1rem;
  }

  .player-item .crown { color: #f59e0b; }

  .room-code {
    text-align: center;
    font-size: 2.5rem;
    font-weight: 900;
    letter-spacing: 8px;
    color: #a78bfa;
  }

  .word-card {
    background: #1a1a2e;
    border: 3px solid #7c3aed;
    border-radius: 20px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    user-select: none;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .word-card.impostor { border-color: #dc2626; }

  .word-hidden {
    font-size: 1rem;
    color: #888;
  }

  .word-reveal {
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 2px;
    display: none;
  }

  .word-card.revealed .word-hidden { display: none; }
  .word-card.revealed .word-reveal { display: block; }

  .word-card.impostor .word-reveal { color: #ef4444; }
  .word-card:not(.impostor) .word-reveal { color: #a78bfa; }

  .tap-hint {
    color: #555;
    font-size: 0.85rem;
  }

  .error {
    color: #f87171;
    text-align: center;
    font-size: 0.9rem;
    min-height: 1.2rem;
  }

  .info {
    color: #888;
    text-align: center;
    font-size: 0.9rem;
  }

  .badge {
    display: inline-block;
    background: #7c3aed22;
    border: 1px solid #7c3aed55;
    border-radius: 20px;
    padding: 0.2rem 0.8rem;
    font-size: 0.8rem;
    color: #a78bfa;
    text-align: center;
  }

  .waiting-dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }
</style>
</head>
<body>

<!-- JOIN SCREEN -->
<div class="screen active" id="screen-join">
  <h1>🕵️ IMPOSTOR</h1>
  <p class="subtitle">One word. One liar. Find them.</p>
  <input id="input-name" type="text" placeholder="Your name" maxlength="20" autocomplete="off" />
  <button class="btn-primary" onclick="joinRoom()">JOIN</button>
  <p class="error" id="join-error"></p>
</div>

<!-- LOBBY SCREEN -->
<div class="screen" id="screen-lobby">
  <h2>Lobby</h2>
  <div class="player-list" id="lobby-players"></div>
  <p class="info" id="lobby-status"></p>
  <button class="btn-success" id="btn-start" onclick="startGame()" disabled>START GAME</button>
  <button class="btn-secondary" onclick="leaveRoom()">Leave</button>
  <p class="error" id="lobby-error"></p>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="screen-game">
  <h2>Your word</h2>
  <p class="info" id="game-info"></p>
  <div class="word-card" id="word-card" onclick="revealWord()">
    <p class="word-hidden">Tap to reveal your word</p>
    <p class="word-reveal" id="word-text"></p>
    <p class="tap-hint">👆 tap card</p>
  </div>
  <p class="info">Don't show others your screen!</p>
  <button class="btn-secondary" id="btn-reset" style="display:none" onclick="resetGame()">Play Again (Host)</button>
  <button class="btn-secondary" onclick="leaveRoom()">Leave Room</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = '';
  let myCode = '';
  let isHost = false;
  let gameData = null;

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function joinRoom() {
    const name = document.getElementById('input-name').value.trim();
    if (!name) { setError('join-error', 'Enter your name'); return; }
    myName = name;
    myCode = 'DEFAULT';
    setError('join-error', '');
    socket.emit('join-room', { name, code: 'DEFAULT' });
  }

  function startGame() {
    socket.emit('start-game');
  }

  function resetGame() {
    socket.emit('reset-game');
  }

  function leaveRoom() {
    socket.disconnect();
    location.reload();
  }

  function revealWord() {
    const card = document.getElementById('word-card');
    if (card.classList.contains('revealed')) return;
    card.classList.add('revealed');
    card.querySelector('.tap-hint').style.display = 'none';
  }

  function setError(id, msg) {
    document.getElementById(id).textContent = msg;
  }

  document.getElementById('input-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });

  // Socket events
  socket.on('room-update', ({ players, started }) => {
    const list = document.getElementById('lobby-players');
    list.innerHTML = players.map((name, i) =>
      `<div class="player-item">${i === 0 ? '<span class="crown">👑</span>' : '🎭'} ${name}</div>`
    ).join('');

    isHost = players[0] === myName;
    const btnStart = document.getElementById('btn-start');
    btnStart.disabled = !isHost || players.length < 2 || started;

    const status = document.getElementById('lobby-status');
    if (started) {
      status.textContent = 'Game in progress...';
    } else {
      status.innerHTML = `${players.length} player${players.length !== 1 ? 's' : ''} <span class="waiting-dots"></span>`;
      if (!isHost) status.textContent += ' — waiting for host to start';
    }

    if (!started) showScreen('screen-lobby');
  });

  socket.on('game-start', (data) => {
    gameData = data;
    const card = document.getElementById('word-card');
    card.classList.remove('revealed', 'impostor');
    card.querySelector('.tap-hint').style.display = '';

    document.getElementById('word-text').textContent = data.word;
    document.getElementById('game-info').textContent =
      `${data.playerCount} players · ${data.isImpostor ? 'You are the impostor!' : 'Find the impostor!'}`;

    if (data.isImpostor) card.classList.add('impostor');

    const btnReset = document.getElementById('btn-reset');
    btnReset.style.display = isHost ? '' : 'none';

    showScreen('screen-game');
  });

  socket.on('game-reset', () => {
    showScreen('screen-lobby');
    setError('lobby-error', '');
  });

  socket.on('error-msg', (msg) => {
    setError('lobby-error', msg);
    setError('join-error', msg);
  });

  socket.on('disconnect', () => {
    setError('join-error', 'Disconnected from server.');
    showScreen('screen-join');
  });
</script>
</body>
</html>

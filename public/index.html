<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Impostor Game</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f1a;
    color: #eee;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .screen { display: none; width: 100%; max-width: 420px; }
  .screen.active { display: flex; flex-direction: column; gap: 1rem; }

  h1 { font-size: 2rem; text-align: center; letter-spacing: 2px; }
  h2 { font-size: 1.4rem; text-align: center; }

  .subtitle { text-align: center; color: #888; font-size: 0.9rem; }

  input {
    width: 100%;
    padding: 0.9rem 1rem;
    border-radius: 12px;
    border: 2px solid #333;
    background: #1a1a2e;
    color: #eee;
    font-size: 1.1rem;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #7c3aed; }

  button {
    width: 100%;
    padding: 0.9rem;
    border-radius: 12px;
    border: none;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 1px;
  }
  button:active { transform: scale(0.97); }

  .btn-primary  { background: #7c3aed; color: #fff; }
  .btn-secondary{ background: #1f2937; color: #ccc; }
  .btn-success  { background: #16a34a; color: #fff; }

  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: #444;
    font-size: 0.85rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #333;
  }

  .player-list {
    background: #1a1a2e;
    border-radius: 12px;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    min-height: 80px;
  }

  .player-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0.6rem;
    background: #252540;
    border-radius: 8px;
    font-size: 1rem;
  }

  .room-code {
    text-align: center;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 8px;
    color: #a78bfa;
    background: #1a1a2e;
    border-radius: 12px;
    padding: 0.8rem;
  }

  .qr-wrap {
    display: flex;
    justify-content: center;
  }
  .qr-wrap > div {
    background: #fff;
    padding: 12px;
    border-radius: 16px;
    display: inline-block;
  }

  .word-card {
    background: #1a1a2e;
    border: 3px solid #7c3aed;
    border-radius: 20px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    user-select: none;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    transition: border-color 0.3s;
  }

  .word-card.revealed.impostor { border-color: #dc2626; }

  .word-hidden { font-size: 1rem; color: #888; }

  .word-reveal {
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 2px;
    display: none;
  }

  .word-card.revealed .word-hidden { display: none; }
  .word-card.revealed .word-reveal { display: block; }
  .word-card.revealed.impostor .word-reveal { color: #ef4444; }
  .word-card.revealed:not(.impostor) .word-reveal { color: #a78bfa; }

  .lang-picker {
    display: flex;
    gap: 0.5rem;
  }
  .lang-btn {
    flex: 1;
    padding: 0.7rem;
    border-radius: 10px;
    border: 2px solid #333;
    background: #1a1a2e;
    color: #888;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0;
  }
  .lang-btn.active {
    border-color: #7c3aed;
    color: #a78bfa;
    background: #1a1a2e;
  }
  .lang-badge {
    text-align: center;
    font-size: 0.8rem;
    color: #555;
  }

  .tap-hint { color: #555; font-size: 0.85rem; }

  .error { color: #f87171; text-align: center; font-size: 0.9rem; min-height: 1.2rem; }
  .info  { color: #888;   text-align: center; font-size: 0.9rem; }

  .waiting-dots::after {
    content: '';
    animation: dots 1.5s infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }
</style>
</head>
<body>

<!-- LANDING SCREEN -->
<div class="screen active" id="screen-landing">
  <h1>🕵️ IMPOSTOR</h1>
  <p class="subtitle">One word. One liar. Find them.</p>
  <button class="btn-primary" onclick="showCreateFlow()">CREATE ROOM</button>
  <div class="divider">or</div>
  <button class="btn-secondary" onclick="showJoinFlow()">JOIN ROOM</button>
</div>

<!-- CREATE SCREEN -->
<div class="screen" id="screen-create">
  <h1>🕵️ IMPOSTOR</h1>
  <p class="subtitle">Enter your name to create a room</p>
  <input id="create-name" type="text" placeholder="Your name" maxlength="20" autocomplete="off" />
  <p class="lang-badge">Word language</p>
  <div class="lang-picker">
    <button class="lang-btn active" id="lang-en" onclick="selectLang('en')">🇬🇧 EN</button>
    <button class="lang-btn" id="lang-es" onclick="selectLang('es')">🇪🇸 ES</button>
    <button class="lang-btn" id="lang-fr" onclick="selectLang('fr')">🇫🇷 FR</button>
  </div>
  <button class="btn-primary" onclick="createRoom()">CREATE</button>
  <button class="btn-secondary" onclick="showScreen('screen-landing')">Back</button>
  <p class="error" id="create-error"></p>
</div>

<!-- JOIN SCREEN -->
<div class="screen" id="screen-join">
  <h1>🕵️ IMPOSTOR</h1>
  <p class="subtitle">Enter your name and room code</p>
  <input id="join-name" type="text" placeholder="Your name" maxlength="20" autocomplete="off" />
  <input id="join-code" type="text" placeholder="Room code" maxlength="8" autocomplete="off"
    style="text-transform:uppercase; letter-spacing:4px;" />
  <button class="btn-primary" onclick="joinRoom()">JOIN</button>
  <button class="btn-secondary" onclick="showScreen('screen-landing')">Back</button>
  <p class="error" id="join-error"></p>
</div>

<!-- LOBBY SCREEN -->
<div class="screen" id="screen-lobby">
  <h2>Lobby</h2>
  <div class="room-code" id="lobby-code"></div>
  <div class="qr-wrap"><div id="lobby-qr"></div></div>
  <p class="info">Scan QR or share code to invite</p>
  <div class="player-list" id="lobby-players"></div>
  <p class="info" id="lobby-status"></p>
  <button class="btn-success" id="btn-start" onclick="startGame()" disabled>START GAME</button>
  <button class="btn-secondary" onclick="leaveRoom()">Leave</button>
  <p class="error" id="lobby-error"></p>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="screen-game">
  <h2>Your word</h2>
  <p class="info" id="game-info"></p>
  <div class="word-card" id="word-card" onclick="revealWord()">
    <p class="word-hidden">Tap to reveal your word</p>
    <p class="word-reveal" id="word-text"></p>
    <p class="tap-hint">👆 tap card</p>
  </div>
  <p class="info">Don't show others your screen!</p>
  <button class="btn-secondary" id="btn-reset" style="display:none" onclick="resetGame()">Play Again (Host)</button>
  <button class="btn-secondary" onclick="leaveRoom()">Leave Room</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = '';
  let myCode = '';
  let isHost = false;
  let qrGenerated = false;
  let selectedLang = 'en';
  let amImpostor = false;

  function selectLang(lang) {
    selectedLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('lang-' + lang).classList.add('active');
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showCreateFlow() {
    showScreen('screen-create');
    document.getElementById('create-name').focus();
  }

  function showJoinFlow() {
    showScreen('screen-join');
    // Pre-fill room code from ?room= query param
    const params = new URLSearchParams(window.location.search);
    const roomParam = params.get('room');
    if (roomParam) {
      document.getElementById('join-code').value = roomParam.toUpperCase();
      document.getElementById('join-name').focus();
    } else {
      document.getElementById('join-name').focus();
    }
  }

  function createRoom() {
    const name = document.getElementById('create-name').value.trim();
    if (!name) { setError('create-error', 'Enter your name'); return; }
    myName = name;
    setError('create-error', '');
    socket.emit('create-room', { lang: selectedLang });
    // join-room emitted after server responds with room-created
  }

  function joinRoom() {
    const name = document.getElementById('join-name').value.trim();
    const code = document.getElementById('join-code').value.trim().toUpperCase();
    if (!name) { setError('join-error', 'Enter your name'); return; }
    if (!code) { setError('join-error', 'Enter room code'); return; }
    myName = name;
    myCode = code;
    setError('join-error', '');
    socket.emit('join-room', { name, code });
  }

  function startGame() { socket.emit('start-game'); }
  function resetGame() { socket.emit('reset-game'); }

  function leaveRoom() {
    socket.disconnect();
    location.href = '/';
  }

  function revealWord() {
    const card = document.getElementById('word-card');
    if (card.classList.contains('revealed')) return;
    if (amImpostor) card.classList.add('impostor');
    card.classList.add('revealed');
    card.querySelector('.tap-hint').style.display = 'none';
  }

  function setError(id, msg) {
    const el = document.getElementById(id);
    if (el) el.textContent = msg;
  }

  function generateQR(code) {
    const container = document.getElementById('lobby-qr');
    container.innerHTML = '';
    const joinUrl = `${location.origin}/join?room=${code}`;
    // eslint-disable-next-line no-new
    new QRCode(container, {
      text: joinUrl,
      width: 180,
      height: 180,
      colorDark: '#000',
      colorLight: '#fff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }

  // Auto-redirect if landing on /join path
  if (window.location.pathname === '/join') {
    showJoinFlow();
  }

  // Check ?room= on landing too
  (function() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('room')) showJoinFlow();
  })();

  // Keyboard shortcuts
  document.getElementById('create-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') createRoom();
  });
  document.getElementById('join-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('join-code').focus();
  });
  document.getElementById('join-code').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinRoom();
  });
  document.getElementById('join-code').addEventListener('input', function() {
    this.value = this.value.toUpperCase();
  });

  // Socket events
  socket.on('room-created', ({ code }) => {
    myCode = code;
    socket.emit('join-room', { name: myName, code });
  });

  socket.on('room-update', ({ code, players, started }) => {
    document.getElementById('lobby-code').textContent = code;

    if (!qrGenerated) {
      generateQR(code);
      qrGenerated = true;
    }

    const list = document.getElementById('lobby-players');
    list.innerHTML = players.map((name, i) =>
      `<div class="player-item">${i === 0 ? '<span style="color:#f59e0b">👑</span>' : '🎭'} ${name}</div>`
    ).join('');

    isHost = players[0] === myName;
    const btnStart = document.getElementById('btn-start');
    btnStart.disabled = !isHost || players.length < 2 || started;

    const status = document.getElementById('lobby-status');
    if (started) {
      status.textContent = 'Game in progress...';
    } else {
      status.innerHTML = `${players.length} player${players.length !== 1 ? 's' : ''} <span class="waiting-dots"></span>`;
      if (!isHost) status.innerHTML += ' — waiting for host';
    }

    if (!started) showScreen('screen-lobby');
  });

  socket.on('game-start', (data) => {
    amImpostor = data.isImpostor;
    const card = document.getElementById('word-card');
    card.classList.remove('revealed', 'impostor');
    card.querySelector('.tap-hint').style.display = '';

    document.getElementById('word-text').textContent = data.word;
    document.getElementById('game-info').textContent =
      `${data.playerCount} players · Find the impostor!`;

    document.getElementById('btn-reset').style.display = isHost ? '' : 'none';
    showScreen('screen-game');
  });

  socket.on('game-reset', () => {
    qrGenerated = false;
    showScreen('screen-lobby');
    setError('lobby-error', '');
  });

  socket.on('error-msg', (msg) => {
    setError('lobby-error', msg);
    setError('join-error', msg);
    setError('create-error', msg);
  });

  socket.on('disconnect', () => {
    showScreen('screen-landing');
  });
</script>
</body>
</html>
